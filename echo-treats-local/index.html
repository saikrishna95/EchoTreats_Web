<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512x512.png" />
    <title>Echo Treats</title>
    <meta name="description" content="Premium artisan cloud bakery offering custom cakes, cupcakes, cookies, chocolates & desserts. Made-to-order treats crafted with love in Hyderabad." />
    <meta name="author" content="Echo Treats" />

    <meta property="og:title" content="Echo Treats — Artisan Cloud Bakery" />
    <meta property="og:description" content="Deliciously made cloud bakery treats. Custom cakes, cupcakes, cookies & more." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <style>
      html[data-initial-route-hide="1"] body {
        opacity: 0;
      }
    </style>
    <script>
      (function () {
        var path = window.location.pathname.replace(/^\/+|\/+$/g, "");
        var homeSectionPaths = {
          products: true,
          cakes: true,
          brownies: true,
          chocolates: true,
          cupcakes: true,
          tubs: true,
          cheesecakes: true,
          cookies: true,
          new: true,
          occasions: true,
          custom: true,
          reviews: true,
          feed: true,
          story: true,
          contact: true
        };

        if (homeSectionPaths[path]) {
          document.documentElement.setAttribute("data-initial-route-hide", "1");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
