<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>EchoTreats — Handcrafted Bakery Treats</title>
    <meta name="description" content="Artisan &amp; custom bakery treats made to order. Cakes, brownies, cupcakes, chocolates and more. Order online at EchoTreats." />
    <meta name="keywords" content="bakery, custom cakes, brownies, cupcakes, chocolates, cheesecakes, EchoTreats, order cakes online" />
    <link rel="canonical" href="https://www.echotreats.com" />

    <!-- Open Graph (for WhatsApp, Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="EchoTreats — Handcrafted Bakery Treats" />
    <meta property="og:description" content="Artisan &amp; custom bakery treats made to order. Cakes, brownies, cupcakes and more!" />
    <meta property="og:url" content="https://www.echotreats.com" />
    <meta property="og:image" content="https://www.echotreats.com/apple-touch-icon.png" />
    <meta property="og:site_name" content="EchoTreats" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EchoTreats — Handcrafted Bakery Treats" />
    <meta name="twitter:description" content="Artisan &amp; custom bakery treats made to order." />
    <meta name="twitter:image" content="https://www.echotreats.com/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#ffffff" />

    <style>
      html[data-initial-route-hide="1"] body {
        opacity: 0;
      }
    </style>
    <script>
      (function () {
        var path = window.location.pathname.replace(/^\/+|\/+$/g, "");
        var homeSectionPaths = {
          products: true,
          cakes: true,
          brownies: true,
          chocolates: true,
          cupcakes: true,
          tubs: true,
          cheesecakes: true,
          cookies: true,
          new: true,
          occasions: true,
          custom: true,
          reviews: true,
          feed: true,
          story: true,
          contact: true
        };

        if (homeSectionPaths[path]) {
          document.documentElement.setAttribute("data-initial-route-hide", "1");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
